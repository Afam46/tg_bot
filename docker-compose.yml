services:

  app:
    build: .
    container_name: tg_bot_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - redis
      - db

  nginx:
    image: nginx:latest
    container_name: tg_bot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: tg_bot_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tg_bot
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  redis:
    image: redis:latest
    container_name: tg_bot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  queue:
    build: .
    container_name: tg_bot_queue
    restart: unless-stopped
    command: php artisan queue:work
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - redis